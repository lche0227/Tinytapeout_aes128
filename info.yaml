# Tiny Tapeout project information
project:
  title:        "AES-128 Fully Pipelined Encryption Core"      # Project title
  author:       "lche0227"      # Your name
  discord:      ""      # Your discord username, for communication and automatically assigning you a Tapeout role (optional)
  description:  "AES-128 pipelined encryption core with serial byte-wide interface for key/plaintext loading and ciphertext readback"      # One line description of what your project does
  language:     "Verilog" # other examples include SystemVerilog, Amaranth, VHDL, etc
  clock_hz:     50000000       # Clock frequency in Hz (or 0 if not applicable)

  # How many tiles your design occupies? A single tile is about 340x160 uM.
  tiles: "1x1"          # Valid values: 1x1, 1x2, 2x2, 3x2, 4x2, 3x4 or 4x4

  # Your top module name must start with "tt_um_". Make it unique by including your github username:
  top_module:  "tt_um_lche0227_aes_pipeline_top"

  # List your project's source files here.
  # Source files must be in ./src and you must list each source file separately, one per line.
  # Don't forget to also update `PROJECT_SOURCES` in test/Makefile.
  source_files:
    - "tt_um_lche0227_aes_pipeline_top.v"
    - "key_gen.v"
    - "mix_col.v"
    - "sbox.v"
    - "shift_row.v"
    - "sub_byte.v"
    - "aes_pipeline_top.v"


# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
# This section is for the datasheet/website. Use descriptive names (e.g., RX, TX, MOSI, SCL, SEG_A, etc.).
pinout:
  # Inputs
  ui[0]: "DATA_IN[0]"
  ui[1]: "DATA_IN[1]"
  ui[2]: "DATA_IN[2]"
  ui[3]: "DATA_IN[3]"
  ui[4]: "DATA_IN[4]"
  ui[5]: "DATA_IN[5]"
  ui[6]: "DATA_IN[6]"
  ui[7]: "DATA_IN[7]"

  # Outputs
  uo[0]: "CIPHER_OUT[0]"
  uo[1]: "CIPHER_OUT[1]"
  uo[2]: "CIPHER_OUT[2]"
  uo[3]: "CIPHER_OUT[3]"
  uo[4]: "CIPHER_OUT[4]"
  uo[5]: "CIPHER_OUT[5]"
  uo[6]: "CIPHER_OUT[6]"
  uo[7]: "CIPHER_OUT[7]"

  # Bidirectional pins
  uio[0]: "DONE (output)"
  uio[1]: "BYTE_INDEX[0]"
  uio[2]: "BYTE_INDEX[1]"
  uio[3]: "BYTE_INDEX[2]"
  uio[4]: "BYTE_INDEX[3]"
  uio[5]: "BYTE_INDEX[4]"
  uio[6]: "WE (write enable)"
  uio[7]: "START / OUTPUT_SEL"

# Do not change!
yaml_version: 6
